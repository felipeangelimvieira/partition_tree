project:
  type: website
  output-dir: _site

website:
  title: "Partition Tree"
  description: "Conditional Density Estimation over General Outcome Spaces"
  repo-url: https://github.com/felipeangelimvieira/partition_tree
  repo-actions: [issue, source]
  navbar:
    left:
      - text: "Get Started"
        href: index.qmd
      - text: "Theory"
        href: theory.qmd
      - text: "Tutorials"
        menu:
          - text: "sklearn Interface"
            href: tutorials/sklearn.qmd
          - text: "skpro Interface (Probabilistic)"
            href: tutorials/skpro.qmd
      - text: "API Reference"
        href: api.qmd
    right:
      - icon: github
        href: https://github.com/felipeangelimvieira/partition_tree

  page-footer:
    center: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: github




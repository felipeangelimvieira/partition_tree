name: Integration CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - .github/workflows/integration-ci.yml
      - crates/**
      - pyo3_partition_tree/src/**
      - pyo3_partition_tree/Cargo.toml
      - pyo3_partition_tree/pyproject.toml
      - partition_tree/src/**
      - partition_tree/pyproject.toml
      - tests/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust stable
        run: |
          rustup update stable
          rustup default stable
          rustc -V
          cargo -V

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml', 'pyo3_partition_tree/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Install maturin
        run: pip install maturin

      - name: Build pyo3_partition_tree wheel from source
        working-directory: pyo3_partition_tree
        run: maturin build --release --out dist

      - name: Install pyo3_partition_tree wheel
        run: pip install pyo3_partition_tree/dist/*.whl

      - name: Install partition_tree from source
        run: pip install -e partition_tree/

      - name: Install test dependencies
        run: pip install pytest scikit-learn

      - name: Run pyo3 tests
        run: pytest pyo3_partition_tree/tests/ -v

      - name: Run partition_tree tests
        run: pytest partition_tree/tests/ -v

      - name: Run root tests
        run: pytest tests/ -v

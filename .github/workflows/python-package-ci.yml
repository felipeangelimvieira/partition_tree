name: Python Package CI

on:
  push:
    branches: [main]
  release:
    types: [published]
  pull_request:
    paths:
      - .github/workflows/python-package-ci.yml
      - partition_tree/docs/**
      - partition_tree/src/**
      - partition_tree/pyproject.toml
      - partition_tree/uv.lock
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write

jobs:
  build-package:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'partition_tree-py-v')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build frontend
        run: python -m pip install --upgrade build
      - name: Build wheel and sdist
        working-directory: partition_tree
        run: python -m build --outdir dist
      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-dist
          path: partition_tree/dist

  publish-package:
    name: Publish Python Package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' && startsWith(github.event.release.tag_name, 'partition_tree-py-v') }}
    needs: [build-package]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v6
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'python-package-dist/*'
      - name: Verify PyPI token
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -z "$UV_PUBLISH_TOKEN" ]]; then
            echo "Missing GitHub Actions secret PYPI_API_TOKEN." >&2
            echo "Add a PyPI API token in Settings > Secrets and variables > Actions." >&2
            exit 1
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        run: uv publish --check-url https://pypi.org/simple/ 'python-package-dist/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  test-pypi:
    name: Test from PyPI (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' && startsWith(github.event.release.tag_name, 'partition_tree-py-v') }}
    needs: [publish-package]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Extract version from tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#partition_tree-py-v}"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Install from PyPI (with retries)
        run: |
          for i in $(seq 1 10); do
            pip install --no-cache-dir "partition_tree==$VERSION" && break
            echo "Attempt $i/10 failed, retrying in 60s..."
            sleep 60
          done

      - name: Install test dependencies
        run: pip install pytest

      - name: Run root tests
        run: pytest tests/ -v

      - name: Run partition_tree tests
        run: pytest partition_tree/tests/ -v

  docs-pr:
    name: Build Documentation (PR / push)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Rust stable
        run: |
          rustup update stable
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml', 'pyo3_partition_tree/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      - name: Install maturin
        run: pip install maturin

      - name: Build pyo3_partition_tree wheel from source
        working-directory: pyo3_partition_tree
        run: maturin build --release --out dist

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyo3_partition_tree/dist/*.whl
          python -m pip install -e "./partition_tree[docs]"

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/partition_tree/src" >> "$GITHUB_ENV"

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Check Quarto installation
        run: quarto check

      - name: Render Quarto site
        working-directory: partition_tree
        run: quarto render docs

      - name: Publish PR Preview
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./partition_tree/docs/_site
          destination_dir: previews/pr-${{ github.event.number }}

      - name: Publish Dev Site
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./partition_tree/docs/_site
          destination_dir: dev

  docs:
    name: Build and Deploy Documentation (Release)
    runs-on: ubuntu-latest
    needs: [publish-package, test-pypi]
    if: ${{ github.event_name == 'release' && startsWith(github.event.release.tag_name, 'partition_tree-py-v') && needs.publish-package.result == 'success' && needs.test-pypi.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Extract version from tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#partition_tree-py-v}"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Install documentation dependencies from PyPI
        run: |
          python -m pip install --upgrade pip
          python -m pip install "partition_tree==$VERSION"

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/partition_tree/src" >> "$GITHUB_ENV"

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Check Quarto installation
        run: quarto check

      - name: Render Quarto site
        working-directory: partition_tree
        run: quarto render docs

      - name: Derive release docs version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#partition_tree-py-}"
          echo "DOCS_VERSION=$version" >> "$GITHUB_ENV"

      - name: Publish Versioned Site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./partition_tree/docs/_site
          destination_dir: ${{ env.DOCS_VERSION }}

      - name: Create latest alias
        if: ${{ !contains(env.DOCS_VERSION, '-') }}
        run: |
          rm -rf ./latest
          mkdir -p ./latest
          cp -R ./partition_tree/docs/_site/. ./latest/

      - name: Publish Latest Alias
        if: ${{ !contains(env.DOCS_VERSION, '-') }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./latest
          destination_dir: latest

      - name: Publish Production Site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./partition_tree/docs/_site
          keep_files: true
          cname: partitiontree.com

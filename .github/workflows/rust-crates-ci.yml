name: Rust Crates CI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      crate:
        description: 'Crate to publish'
        required: true
        type: choice
        options:
          - estimators
          - partition_tree

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test-estimators:
    name: Test estimators crate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.crate == 'estimators' || startsWith(github.ref, 'refs/tags/estimators-v') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust stable
        run: |
          rustup update stable
          rustup default stable
          rustc -V
          cargo -V

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-estimators-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml', 'pyo3_partition_tree/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-estimators-

      - name: Build estimators
        run: cargo build --release -p estimators

      - name: Test estimators
        run: cargo test --release -p estimators

  test-partition-tree:
    name: Test partition_tree crate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.crate == 'partition_tree' || startsWith(github.ref, 'refs/tags/partition_tree-v') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust stable
        run: |
          rustup update stable
          rustup default stable
          rustc -V
          cargo -V

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-partition-tree-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml', 'pyo3_partition_tree/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-partition-tree-

      - name: Build partition_tree
        run: cargo build --release -p partition_tree

      - name: Test partition_tree
        run: cargo test --release -p partition_tree

  publish-estimators:
    name: Publish estimators to crates.io
    runs-on: ubuntu-latest
    needs: [test-estimators]
    if: ${{ startsWith(github.ref, 'refs/tags/estimators-v') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust stable
        run: |
          rustup update stable
          rustup default stable

      - name: Verify crates.io token
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [[ -z "$CRATES_IO_TOKEN" ]]; then
            echo "Missing GitHub Actions secret CRATES_IO_TOKEN." >&2
            echo "Add a crates.io API token in Settings > Secrets and variables > Actions." >&2
            exit 1
          fi

      - name: Publish estimators
        run: cargo publish -p estimators --token ${{ secrets.CRATES_IO_TOKEN }}

  publish-partition-tree:
    name: Publish partition_tree to crates.io
    runs-on: ubuntu-latest
    needs: [test-partition-tree]
    if: ${{ startsWith(github.ref, 'refs/tags/partition_tree-v') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust stable
        run: |
          rustup update stable
          rustup default stable

      - name: Verify crates.io token
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [[ -z "$CRATES_IO_TOKEN" ]]; then
            echo "Missing GitHub Actions secret CRATES_IO_TOKEN." >&2
            echo "Add a crates.io API token in Settings > Secrets and variables > Actions." >&2
            exit 1
          fi

      - name: Publish partition_tree
        run: cargo publish -p partition_tree --token ${{ secrets.CRATES_IO_TOKEN }}
